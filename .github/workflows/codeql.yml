# CodeQL code scanning for the @postalsys/ee-client library.
#
# Analyzes the JavaScript runtime code and the GitHub Actions workflows.
# The example demo is excluded from analysis via the config file below.
name: "CodeQL Advanced"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '40 17 * * 6'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # Skip the release-please release commit, whose subject is
    # "chore(master): release X.Y.Z [skip-ci]". Anchor on the subject prefix
    # with startsWith - matching the whole message would also skip any ordinary
    # commit that merely mentions [skip-ci] in its body.
    if: "${{ !startsWith(github.event.head_commit.message, 'chore(master): release') }}"
    runs-on: ubuntu-latest
    permissions:
      # required for all workflows
      security-events: write

      # required to fetch internal or private CodeQL packs
      packages: read

      # only required for workflows in private repositories
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: actions
          build-mode: none
        - language: javascript-typescript
          build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        config-file: ./.github/codeql/codeql-config.yml

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
