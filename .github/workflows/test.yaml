on:
    push:
        branches:
            - master
    pull_request:

name: test

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        # Skip on release-please commits, which carry [skip-ci] in the subject.
        # release.yaml is intentionally not guarded so publishing still runs.
        if: ${{ !contains(github.event.head_commit.message, '[skip-ci]') }}
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [22, 24]
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm
            - run: npm ci
            - run: npm test
