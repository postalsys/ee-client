on:
    push:
        branches:
            - master
    pull_request:

name: test

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        # Skip the release-please release commit, whose subject is
        # "chore(master): release X.Y.Z [skip-ci]". Anchor on the subject
        # prefix with startsWith - matching the whole message would also skip
        # any ordinary commit that merely mentions [skip-ci] in its body.
        # release.yaml is intentionally not guarded so publishing still runs.
        if: "${{ !startsWith(github.event.head_commit.message, 'chore(master): release') }}"
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [22, 24]
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm
            - run: npm ci
            - run: npm test
